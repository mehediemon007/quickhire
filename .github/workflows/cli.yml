name : Fullstack Health Check

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    backend-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install & Build Backend
              run: |
                cd server
                npm install
                npm run build

    frontend-check:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Install & Build Frontend
              run: |
                cd client
                npm install
                npm run build
